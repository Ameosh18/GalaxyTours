<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" width="400" height="260">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8f4fd"/>
      <stop offset="100%" stop-color="#c8dff0"/>
    </linearGradient>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e74c3c"/>
      <stop offset="100%" stop-color="#c0392b"/>
    </linearGradient>
    <linearGradient id="roof" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f05a4e"/>
      <stop offset="100%" stop-color="#e74c3c"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#aee6ff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#7dc8ee" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="wheel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#555"/>
      <stop offset="100%" stop-color="#222"/>
    </linearGradient>
    <linearGradient id="road" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7a8a7f"/>
      <stop offset="100%" stop-color="#5a6a5f"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#00000030"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="260" fill="url(#bg)"/>

  <!-- Mountains in background -->
  <polygon points="0,140 60,90 120,130 200,70 280,110 350,75 400,100 400,160 0,160" fill="#b8d4c8" opacity="0.5"/>
  <polygon points="0,155 80,105 160,140 240,100 320,130 400,110 400,165 0,165" fill="#9abfb3" opacity="0.4"/>

  <!-- Road -->
  <ellipse cx="200" cy="220" rx="220" ry="30" fill="url(#road)" opacity="0.5"/>

  <!-- Car shadow -->
  <ellipse cx="200" cy="205" rx="130" ry="15" fill="#00000025"/>

  <!-- Car body -->
  <g filter="url(#shadow)">
    <!-- Lower body -->
    <rect x="60" y="155" width="280" height="45" rx="8" fill="url(#body)"/>
    <!-- Roof / upper body -->
    <path d="M110,155 L130,115 L270,115 L295,155 Z" fill="url(#roof)"/>

    <!-- Front hood -->
    <path d="M295,155 L340,155 L345,170 L295,175 Z" fill="#c0392b"/>
    <!-- Rear -->
    <path d="M110,155 L65,155 L58,170 L110,175 Z" fill="#c0392b"/>

    <!-- Front bumper -->
    <rect x="335" y="168" width="15" height="18" rx="3" fill="#999"/>
    <!-- Rear bumper -->
    <rect x="50" y="168" width="15" height="18" rx="3" fill="#999"/>

    <!-- Windshield (front) -->
    <path d="M270,117 L292,153 L250,153 L258,117 Z" fill="url(#glass)" opacity="0.85"/>
    <!-- Windshield glare -->
    <path d="M274,120 L284,140 L268,140 Z" fill="white" opacity="0.3"/>

    <!-- Rear window -->
    <path d="M130,117 L107,153 L148,153 L140,117 Z" fill="url(#glass)" opacity="0.85"/>

    <!-- Side windows -->
    <rect x="155" y="120" width="50" height="32" rx="3" fill="url(#glass)" opacity="0.85"/>
    <rect x="215" y="120" width="38" height="32" rx="3" fill="url(#glass)" opacity="0.85"/>

    <!-- Door line -->
    <line x1="210" y1="118" x2="210" y2="198" stroke="#a03020" stroke-width="1.5"/>
    <!-- Door handle -->
    <rect x="180" y="163" width="18" height="5" rx="2.5" fill="#ddd"/>
    <rect x="230" y="163" width="14" height="5" rx="2.5" fill="#ddd"/>

    <!-- Headlight -->
    <ellipse cx="338" cy="160" rx="10" ry="7" fill="#fff9c4"/>
    <ellipse cx="338" cy="160" rx="7" ry="5" fill="#ffee44"/>
    <!-- Tail light -->
    <rect x="56" y="155" width="12" height="14" rx="2" fill="#ff4444"/>

    <!-- Wheels -->
    <!-- Rear wheel -->
    <circle cx="120" cy="198" r="28" fill="url(#wheel)"/>
    <circle cx="120" cy="198" r="20" fill="#888"/>
    <circle cx="120" cy="198" r="12" fill="#444"/>
    <circle cx="120" cy="198" r="5" fill="#ccc"/>
    <!-- Spokes -->
    <line x1="120" y1="180" x2="120" y2="216" stroke="#666" stroke-width="2.5"/>
    <line x1="102" y1="198" x2="138" y2="198" stroke="#666" stroke-width="2.5"/>
    <line x1="107" y1="185" x2="133" y2="211" stroke="#666" stroke-width="2.5"/>
    <line x1="133" y1="185" x2="107" y2="211" stroke="#666" stroke-width="2.5"/>

    <!-- Front wheel -->
    <circle cx="285" cy="198" r="28" fill="url(#wheel)"/>
    <circle cx="285" cy="198" r="20" fill="#888"/>
    <circle cx="285" cy="198" r="12" fill="#444"/>
    <circle cx="285" cy="198" r="5" fill="#ccc"/>
    <line x1="285" y1="180" x2="285" y2="216" stroke="#666" stroke-width="2.5"/>
    <line x1="267" y1="198" x2="303" y2="198" stroke="#666" stroke-width="2.5"/>
    <line x1="272" y1="185" x2="298" y2="211" stroke="#666" stroke-width="2.5"/>
    <line x1="298" y1="185" x2="272" y2="211" stroke="#666" stroke-width="2.5"/>

    <!-- Roof rack suggestion -->
    <rect x="135" y="112" width="128" height="5" rx="2" fill="#a03020"/>
  </g>

  <!-- Label -->
  <text x="200" y="248" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#2d5a3d" opacity="0.8">Hatchback · Swift / i20</text>
</svg>
