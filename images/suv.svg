<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 270" width="420" height="270">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eef2f8"/>
      <stop offset="100%" stop-color="#d0dcea"/>
    </linearGradient>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2d5a3d"/>
      <stop offset="100%" stop-color="#1b3a28"/>
    </linearGradient>
    <linearGradient id="roof" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a7050"/>
      <stop offset="100%" stop-color="#2d5a3d"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#8ecfe0" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#b8e8f8" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="wheel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#444"/>
      <stop offset="100%" stop-color="#111"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#00000030"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="420" height="270" fill="url(#bg)"/>

  <!-- Mountain silhouettes -->
  <polygon points="0,140 70,85 140,125 230,65 320,105 420,80 420,165 0,165" fill="#a8bcc8" opacity="0.5"/>
  <polygon points="0,155 100,105 195,140 300,100 420,125 420,165 0,165" fill="#8aaab8" opacity="0.38"/>

  <!-- Shadow -->
  <ellipse cx="210" cy="215" rx="160" ry="15" fill="#00000022"/>

  <!-- Car body (SUV - tall, boxy, wide) -->
  <g filter="url(#shadow)">
    <!-- Main body (boxy and tall) -->
    <rect x="45" y="140" width="330" height="60" rx="8" fill="url(#body)"/>

    <!-- Roof (flat, tall) -->
    <rect x="85" y="100" width="255" height="42" rx="6" fill="url(#roof)"/>

    <!-- Front nose -->
    <path d="M340,140 L375,142 L375,175 L340,178 Z" fill="#1b3a28"/>
    <!-- Front bumper/skid plate -->
    <rect x="372" y="168" width="18" height="22" rx="4" fill="#333"/>
    <!-- Grille -->
    <rect x="368" y="145" width="12" height="24" rx="2" fill="#111"/>
    <line x1="370" y1="150" x2="378" y2="150" stroke="#555" stroke-width="1.5"/>
    <line x1="370" y1="155" x2="378" y2="155" stroke="#555" stroke-width="1.5"/>
    <line x1="370" y1="160" x2="378" y2="160" stroke="#555" stroke-width="1.5"/>
    <line x1="370" y1="165" x2="378" y2="165" stroke="#555" stroke-width="1.5"/>

    <!-- Headlights (squared, DRL style) -->
    <rect x="360" y="140" width="16" height="10" rx="2" fill="#fff9c4"/>
    <rect x="362" y="142" width="10" height="6" rx="1" fill="#ffee44"/>
    <!-- DRL strip -->
    <rect x="350" y="140" width="12" height="3" rx="1" fill="#fff" opacity="0.8"/>

    <!-- Rear -->
    <path d="M88,140 L50,142 L45,175 L88,178 Z" fill="#1b3a28"/>
    <rect x="38" y="168" width="15" height="22" rx="4" fill="#333"/>
    <!-- Tail light (full-width style) -->
    <rect x="44" y="140" width="10" height="20" rx="2" fill="#ff3333"/>
    <rect x="44" y="158" width="10" height="10" rx="2" fill="#ffaa00"/>

    <!-- Windshield (upright, large) -->
    <path d="M258,102 L338,140 L258,140 Z" fill="url(#glass)" opacity="0.9"/>
    <path d="M264,108 L310,135 L264,135 Z" fill="white" opacity="0.2"/>

    <!-- Rear window -->
    <path d="M86,102 L160,140 L86,140 Z" fill="url(#glass)" opacity="0.88"/>

    <!-- Side windows (3 rows) -->
    <rect x="165" y="105" width="42" height="32" rx="3" fill="url(#glass)" opacity="0.88"/>
    <rect x="214" y="105" width="38" height="32" rx="3" fill="url(#glass)" opacity="0.88"/>

    <!-- Door lines -->
    <line x1="210" y1="100" x2="210" y2="200" stroke="#163a22" stroke-width="1.5"/>
    <line x1="257" y1="100" x2="257" y2="200" stroke="#163a22" stroke-width="1.5"/>

    <!-- Door handles -->
    <rect x="175" y="165" width="20" height="6" rx="3" fill="#888"/>
    <rect x="225" y="165" width="20" height="6" rx="3" fill="#888"/>
    <rect x="268" y="165" width="20" height="6" rx="3" fill="#888"/>

    <!-- Roof rack -->
    <rect x="92" y="97" width="240" height="5" rx="2" fill="#111"/>
    <rect x="100" y="92" width="4" height="8" rx="1" fill="#555"/>
    <rect x="148" y="92" width="4" height="8" rx="1" fill="#555"/>
    <rect x="196" y="92" width="4" height="8" rx="1" fill="#555"/>
    <rect x="244" y="92" width="4" height="8" rx="1" fill="#555"/>
    <rect x="292" y="92" width="4" height="8" rx="1" fill="#555"/>
    <rect x="326" y="92" width="4" height="8" rx="1" fill="#555"/>

    <!-- Wheels (larger, chunky) -->
    <!-- Rear wheel -->
    <circle cx="115" cy="205" r="33" fill="url(#wheel)"/>
    <circle cx="115" cy="205" r="24" fill="#666"/>
    <circle cx="115" cy="205" r="15" fill="#333"/>
    <circle cx="115" cy="205" r="6" fill="#aaa"/>
    <line x1="115" y1="182" x2="115" y2="228" stroke="#555" stroke-width="3"/>
    <line x1="92" y1="205" x2="138" y2="205" stroke="#555" stroke-width="3"/>
    <line x1="99" y1="189" x2="131" y2="221" stroke="#555" stroke-width="3"/>
    <line x1="131" y1="189" x2="99" y2="221" stroke="#555" stroke-width="3"/>
    <!-- Tyre detail -->
    <circle cx="115" cy="205" r="33" fill="none" stroke="#555" stroke-width="2" stroke-dasharray="8,6"/>

    <!-- Front wheel -->
    <circle cx="308" cy="205" r="33" fill="url(#wheel)"/>
    <circle cx="308" cy="205" r="24" fill="#666"/>
    <circle cx="308" cy="205" r="15" fill="#333"/>
    <circle cx="308" cy="205" r="6" fill="#aaa"/>
    <line x1="308" y1="182" x2="308" y2="228" stroke="#555" stroke-width="3"/>
    <line x1="285" y1="205" x2="331" y2="205" stroke="#555" stroke-width="3"/>
    <line x1="292" y1="189" x2="324" y2="221" stroke="#555" stroke-width="3"/>
    <line x1="324" y1="189" x2="292" y2="221" stroke="#555" stroke-width="3"/>
    <circle cx="308" cy="205" r="33" fill="none" stroke="#555" stroke-width="2" stroke-dasharray="8,6"/>

    <!-- Side steps / running boards -->
    <rect x="82" y="196" width="258" height="8" rx="3" fill="#111" opacity="0.7"/>

    <!-- Fog lights -->
    <ellipse cx="367" cy="178" rx="7" ry="5" fill="#fff9c4" opacity="0.7"/>
  </g>

  <text x="210" y="255" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#2d5a3d" opacity="0.85">SUV · Innova / Ertiga</text>
</svg>
