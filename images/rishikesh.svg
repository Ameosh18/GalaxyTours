<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a6b8a"/>
      <stop offset="55%" stop-color="#2d9ccd"/>
      <stop offset="100%" stop-color="#87ceeb"/>
    </linearGradient>
    <linearGradient id="hill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2D6A4F"/>
      <stop offset="100%" stop-color="#40916C"/>
    </linearGradient>
    <linearGradient id="river" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#48CAE4"/>
      <stop offset="100%" stop-color="#0096C7"/>
    </linearGradient>
    <linearGradient id="bank" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4A853"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
  </defs>
  <!-- Sky -->
  <rect width="800" height="500" fill="url(#sky)"/>
  <!-- Hills behind -->
  <path d="M0,260 Q100,160 250,200 Q400,140 550,180 Q680,150 800,170 L800,500 L0,500Z" fill="url(#hill)" opacity="0.7"/>
  <path d="M0,300 Q120,220 280,255 Q440,200 600,240 Q720,210 800,225 L800,500 L0,500Z" fill="url(#hill)"/>
  <!-- River bank -->
  <path d="M0,370 Q200,350 400,360 Q600,350 800,365 L800,440 Q600,420 400,430 Q200,425 0,415Z" fill="url(#bank)"/>
  <!-- River -->
  <path d="M0,415 Q200,400 400,408 Q600,398 800,410 L800,500 L0,500Z" fill="url(#river)" opacity="0.9"/>
  <!-- River shimmer -->
  <path d="M50,425 Q150,420 250,424" stroke="white" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M400,418 Q500,413 600,417" stroke="white" stroke-width="1.5" fill="none" opacity="0.4"/>
  <path d="M150,435 Q280,430 380,434" stroke="white" stroke-width="1" fill="none" opacity="0.3"/>
  <!-- Bridge (Ram Jhula style) -->
  <line x1="180" y1="340" x2="620" y2="340" stroke="#8B6914" stroke-width="4"/>
  <line x1="180" y1="350" x2="620" y2="350" stroke="#8B6914" stroke-width="3"/>
  <!-- Bridge cables -->
  <line x1="320" y1="290" x2="180" y2="350" stroke="#8B6914" stroke-width="1.5"/>
  <line x1="320" y1="290" x2="280" y2="350" stroke="#8B6914" stroke-width="1.5"/>
  <line x1="320" y1="290" x2="380" y2="350" stroke="#8B6914" stroke-width="1.5"/>
  <line x1="480" y1="290" x2="420" y2="350" stroke="#8B6914" stroke-width="1.5"/>
  <line x1="480" y1="290" x2="520" y2="350" stroke="#8B6914" stroke-width="1.5"/>
  <line x1="480" y1="290" x2="620" y2="350" stroke="#8B6914" stroke-width="1.5"/>
  <!-- Towers -->
  <rect x="308" y="260" width="24" height="90" fill="#8B6914"/>
  <rect x="468" y="260" width="24" height="90" fill="#8B6914"/>
  <!-- Temple on hill -->
  <rect x="680" y="218" width="18" height="30" fill="#CC7A00"/>
  <polygon points="680,218 689,200 698,218" fill="#FF8C00"/>
  <!-- Sun/golden hour glow -->
  <circle cx="120" cy="90" r="45" fill="#FFB700" opacity="0.6"/>
  <circle cx="120" cy="90" r="70" fill="#FFD166" opacity="0.2"/>
</svg>
