<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a8edcb"/>
      <stop offset="60%" stop-color="#d4f1e4"/>
      <stop offset="100%" stop-color="#e8f8f0"/>
    </linearGradient>
    <linearGradient id="hill1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1B4332"/>
      <stop offset="100%" stop-color="#2D6A4F"/>
    </linearGradient>
    <linearGradient id="hill2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#40916C"/>
      <stop offset="100%" stop-color="#52B788"/>
    </linearGradient>
    <linearGradient id="mist" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="white" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="white" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.4"/>
    </linearGradient>
  </defs>
  <!-- Sky -->
  <rect width="800" height="500" fill="url(#sky)"/>
  <!-- Far hills -->
  <path d="M0,280 Q100,180 200,220 Q300,160 400,200 Q500,150 600,190 Q700,160 800,180 L800,500 L0,500Z" fill="url(#hill1)" opacity="0.6"/>
  <!-- Mid hills -->
  <path d="M0,320 Q80,240 180,270 Q280,220 380,260 Q480,210 580,250 Q680,220 800,240 L800,500 L0,500Z" fill="url(#hill1)"/>
  <!-- Foreground hill -->
  <path d="M0,380 Q150,300 300,340 Q450,290 600,330 Q700,310 800,325 L800,500 L0,500Z" fill="url(#hill2)"/>
  <!-- Mist layers -->
  <rect x="0" y="240" width="800" height="60" fill="url(#mist)"/>
  <rect x="0" y="290" width="800" height="40" fill="url(#mist)" opacity="0.6"/>
  <!-- Sun -->
  <circle cx="650" cy="100" r="40" fill="#FFD166" opacity="0.7"/>
  <circle cx="650" cy="100" r="55" fill="#FFD166" opacity="0.2"/>
  <!-- Trees silhouette -->
  <g fill="#1B4332">
    <polygon points="120,380 130,340 140,380"/>
    <polygon points="135,380 147,330 159,380"/>
    <polygon points="155,380 165,345 175,380"/>
    <polygon points="600,325 610,285 620,325"/>
    <polygon points="615,325 628,278 641,325"/>
    <polygon points="638,325 648,290 658,325"/>
    <polygon points="655,325 665,285 675,325"/>
  </g>
</svg>
